.role-summary-meta {
  align-items: flex-end;
  text-align: right;
}

.role-summary p {
  margin: 0;
}

.role-period {
  width: fit-content;
  min-height: 36px;
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 999px;
  padding: 8px 12px;
  color: var(--lime);
  background: rgba(198, 255, 87, 0.08);
  font-size: 0.85rem;
  font-weight: 720;
}

.role-bullets {
  display: grid;
  gap: 12px;
}

.bullet-row {
  display: grid;
  grid-template-columns: 22px minmax(0, 1fr);
  gap: 12px;
  align-items: flex-start;
  min-height: 74px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 18px;
  background: rgba(255, 255, 255, 0.045);
}

.bullet-row svg {
  color: var(--lime);
  margin-top: 2px;
}

.bullet-row span {
  color: var(--muted-strong);
  line-height: 1.55;
}

.case-band {
  display: grid;
  grid-template-columns: minmax(0, 0.92fr) minmax(260px, 0.62fr);
  gap: 30px;
  align-items: center;
  overflow: hidden;
  border: 1px solid rgba(198, 255, 87, 0.22);
  border-radius: var(--radius);
  padding: 30px;
  background:
    linear-gradient(115deg, rgba(198, 255, 87, 0.18), transparent 35%),
    linear-gradient(290deg, rgba(125, 231, 255, 0.11), transparent 38%),
    var(--panel-strong);
  box-shadow: var(--shadow);
}

.case-content {
  max-width: 620px;
}

.case-icon,
.project-icon {
  display: grid;
  place-items: center;
  width: 48px;
  height: 48px;
  margin-bottom: 20px;
  border: 1px solid rgba(198, 255, 87, 0.28);
  border-radius: 8px;
  color: var(--lime);
  background: rgba(198, 255, 87, 0.1);
}

.case-band h3 {
  font-size: 2.15rem;
}

.text-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 22px;
  color: var(--lime);
  font-weight: 760;
}

.case-modules {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}

.module-tile {
  min-height: 102px;
  border: 1px solid rgba(255, 255, 255, 0.11);
  border-radius: var(--radius);
  padding: 16px;
  background: rgba(8, 10, 13, 0.46);
}

.module-tile span {
  display: block;
  margin-bottom: 20px;
  color: var(--cyan);
  font-size: 0.76rem;
  font-weight: 780;
}

.module-tile strong {
  color: var(--text);
  font-size: 1rem;
}

.impact-list {
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
}

.impact-item {
  display: grid;
  grid-template-columns: 22px minmax(0, 1fr);
  gap: 10px;
  min-height: 78px;
  border-top: 1px solid var(--line);
  padding-top: 16px;
  color: var(--muted-strong);
  line-height: 1.48;
}

.impact-item svg {
  color: var(--lime);
}

.tool-marquee {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.tool-chip {
  gap: 9px;
  min-height: 44px;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 10px 14px;
  background: rgba(255, 255, 255, 0.045);
}

.tool-chip svg {
  color: var(--amber);
}

.tool-chip strong {
  color: var(--text);
  font-size: 0.93rem;
}

.tool-chip span {
  color: var(--muted);
  font-size: 0.82rem;
}

.skills-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 14px;
}

.skill-card,
.project-card {
  min-height: 276px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 22px;
  background: var(--panel);
  backdrop-filter: blur(20px);
}

.skill-card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 24px;
}

.skill-card-top svg {
  color: var(--lime);
}

.skill-card-top span {
  color: var(--cyan);
  font-weight: 780;
}

.skill-meter {
  overflow: hidden;
  height: 8px;
  margin: 17px 0 18px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.08);
}

.skill-meter span {
  display: block;
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--lime), var(--cyan));
}

.tag-cloud {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.tag-cloud span {
  min-height: 28px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 999px;
  padding: 6px 9px;
  color: var(--muted-strong);
  background: rgba(255, 255, 255, 0.04);
  font-size: 0.78rem;
}

.projects-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 14px;
}

.project-card {
  display: flex;
  flex-direction: column;
}

.project-card > span {
  margin-bottom: 10px;
  color: var(--cyan);
  font-size: 0.78rem;
  font-weight: 760;
  text-transform: uppercase;
}

.project-card ul {
  display: grid;
  gap: 9px;
  margin: 18px 0 0;
  padding: 0;
  list-style: none;
}

.project-card li {
  position: relative;
  padding-left: 18px;
  color: var(--muted-strong);
  line-height: 1.48;
}

.project-card li::before {
  position: absolute;
  top: 0.68em;
  left: 0;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  content: "";
  background: var(--lime);
}

.achievement-grid {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 12px;
}

.education-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 14px;
}

.education-card {
  display: flex;
  flex-direction: column;
  min-height: 255px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 20px;
  background:
    linear-gradient(145deg, rgba(125, 231, 255, 0.07), transparent 42%),
    rgba(255, 255, 255, 0.045);
}

.education-card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 22px;
}

.education-card-top svg {
  color: var(--lime);
}

.education-card-top span {
  color: var(--cyan);
  font-size: 0.78rem;
  font-weight: 780;
}

.education-card h3 {
  margin: 0;
  color: var(--text);
  font-size: 1.08rem;
  line-height: 1.28;
}

.education-card p {
  margin: 13px 0 0;
  color: var(--muted-strong);
  line-height: 1.58;
}

.education-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: auto;
  padding-top: 20px;
}

.education-tags span {
  min-height: 28px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 999px;
  padding: 6px 9px;
  color: var(--muted-strong);
  background: rgba(8, 10, 13, 0.38);
  font-size: 0.76rem;
}

.achievement {
  display: grid;
  grid-template-rows: auto 1fr;
  gap: 16px;
  min-height: 210px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 18px;
  background: rgba(255, 255, 255, 0.045);
}

.achievement svg {
  color: var(--lime);
}

.achievement span {
  color: var(--muted-strong);
  line-height: 1.5;
}

.contact-section {
  padding: 82px 0 46px;
}

.contact-card {
  display: grid;
  grid-template-columns: minmax(0, 0.8fr) minmax(300px, 0.62fr);
  gap: 32px;
  align-items: center;
  border: 1px solid rgba(198, 255, 87, 0.28);
  border-radius: var(--radius);
  padding: 34px;
  background:
    linear-gradient(120deg, rgba(198, 255, 87, 0.17), transparent 36%),
    linear-gradient(260deg, rgba(255, 111, 145, 0.08), transparent 42%),
    var(--panel-strong);
  box-shadow: var(--shadow);
}

.contact-grid {
  display: grid;
  gap: 10px;
}

.contact-link {
  display: grid;
  grid-template-columns: 22px minmax(82px, 0.36fr) minmax(0, 1fr);
  gap: 12px;
  min-height: 56px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 14px;
  background: rgba(8, 10, 13, 0.42);
  transition:
    border-color 180ms ease,
    background 180ms ease,
    transform 180ms ease;
}

.contact-link:hover {
  transform: translateY(-2px);
  border-color: rgba(198, 255, 87, 0.3);
  background: rgba(198, 255, 87, 0.07);
}

.contact-link svg {
  color: var(--lime);
}

.contact-link span {
  color: var(--muted);
}

.contact-link strong {
  overflow-wrap: anywhere;
  color: var(--text);
}

.footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  padding: 0 0 32px;
  color: var(--muted);
}

.footer span:last-child {
  gap: 8px;
}

@keyframes pulse {
  0% {
    box-shadow: 0 0 0 0 rgba(198, 255, 87, 0.55);
  }

  70% {
    box-shadow: 0 0 0 10px rgba(198, 255, 87, 0);
  }

  100% {
    box-shadow: 0 0 0 0 rgba(198, 255, 87, 0);
  }
}

@media (max-width: 1050px) {
  .hero-grid,
  .role-layout,
  .contact-card {
    grid-template-columns: 1fr;
  }

  .hero-grid {
    gap: 42px;
    padding-top: 58px;
  }

  .hero h1 {
    font-size: 3.7rem;
  }

  .hero-visual {
    min-height: 460px;
  }

  .portrait-stage {
    min-height: 360px;
  }

  .proof-grid,
  .skills-grid,
  .projects-grid,
  .impact-list {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .achievement-grid,
  .education-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
}

@media (max-width: 860px) {
  .hero,
  .section,
  .contact-section,
  .footer {
    width: min(100% - 28px, 1180px);
  }

  .hero {
    min-height: auto;
    padding-top: 18px;
  }

  .nav {
    flex-direction: column;
    align-items: stretch;
  }

  .brand {
    max-width: 100%;
  }

  .nav-cluster {
    flex-direction: column;
    align-items: stretch;
    width: 100%;
  }

  .nav-links {
    width: 100%;
    justify-content: space-between;
    gap: 2px;
    padding: 4px;
  }

  .nav-links a {
    flex: 1;
    justify-content: center;
    text-align: center;
    min-height: 31px;
    padding: 7px 9px;
    font-size: 0.78rem;
  }

  .language-toggle {
    width: fit-content;
    align-self: flex-end;
  }

  .hero h1 {
    font-size: 3rem;
    line-height: 1.02;
  }

  .hero-subtitle {
    font-size: 1.04rem;
  }

  .hero-actions,
  .button {
    width: 100%;
  }

  .role-summary {
    grid-template-columns: 1fr;
  }

  .role-summary-meta {
    align-items: flex-start;
    text-align: left;
  }

  .proof-grid,
  .timeline,
  .case-band,
  .impact-list,
  .skills-grid,
  .projects-grid,
  .achievement-grid,
  .education-grid {
    grid-template-columns: 1fr;
  }

  .proof-item {
    min-height: auto;
  }

  .timeline {
    gap: 16px;
  }

  .timeline-line {
    left: 7px;
  }

  .timeline-card {
    min-height: auto;
    margin-left: 28px;
  }

  .timeline-card:nth-of-type(even) {
    margin-top: 0;
  }

  .timeline-card:nth-of-type(odd) .timeline-dot,
  .timeline-card:nth-of-type(even) .timeline-dot {
    left: -28px;
    right: auto;
  }

  .section {
    padding: 58px 0;
  }

  .section-heading h2,
  .contact-card h2 {
    font-size: 2.15rem;
  }

  .case-band,
  .contact-card {
    padding: 22px;
  }

  .case-band h3 {
    font-size: 1.72rem;
  }

  .case-modules {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .hero-visual {
    min-height: 0;
    padding: 22px;
  }

  .portrait-stage {
    min-height: 330px;
  }

  .visual-header h2 {
    font-size: 1.7rem;
  }

  .system-map {
    grid-template-columns: 1fr;
  }

  .contact-link {
    grid-template-columns: 22px minmax(0, 1fr);
  }

  .contact-link strong {
    grid-column: 2;
  }

  .footer {
    flex-direction: column;
    align-items: flex-start;
  }
}

@media (max-width: 460px) {
  .status-pill {
    width: 100%;
    align-items: flex-start;
    border-radius: 8px;
  }

  .hero h1 {
    font-size: 2.48rem;
  }

  .case-modules {
    grid-template-columns: 1fr;
  }

  .module-tile {
    min-height: 82px;
  }

  .tool-chip {
    width: 100%;
    border-radius: 8px;
  }

  .portrait-hud {
    width: min(190px, calc(100% - 24px));
  }

  .portrait-hud strong {
    font-size: 0.82rem;
  }
}

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    scroll-behavior: auto !important;
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
  }
}


/* UML landing style adaptation */
:root {
  --bg: #050509;
  --bg-2: #070a12;
  --panel: rgba(255, 255, 255, 0.046);
  --panel-strong: rgba(7, 12, 20, 0.78);
  --line: rgba(255, 255, 255, 0.09);
  --line-strong: rgba(97, 244, 255, 0.36);
  --text: #ffffff;
  --muted: rgba(255, 255, 255, 0.48);
  --muted-strong: rgba(255, 255, 255, 0.72);
  --lime: #61f4ff;
  --lime-soft: rgba(97, 244, 255, 0.13);
  --cyan: #61f4ff;
  --blue: #3aa7ff;
  --violet: #9b6cff;
  --emerald: #44f0a9;
  --steel: rgba(255, 255, 255, 0.64);
  --amber: #44f0a9;
  --shadow: 0 34px 120px rgba(0, 0, 0, 0.38);
}

body {
  background:
    radial-gradient(circle at 30% -10%, rgba(58, 167, 255, 0.18), transparent 28rem),
    radial-gradient(circle at 78% 16%, rgba(155, 108, 255, 0.13), transparent 26rem),
    linear-gradient(180deg, #050509 0%, #070a12 42%, #050509 100%);
}

body::before {
  background:
    linear-gradient(115deg, rgba(68, 240, 169, 0.06), transparent 28%, rgba(155, 108, 255, 0.08) 44%, transparent 58%),
    linear-gradient(235deg, transparent 10%, rgba(97, 244, 255, 0.08) 34%, transparent 52%, rgba(58, 167, 255, 0.07) 72%, transparent 88%),
    radial-gradient(circle at 52% 36%, rgba(255, 255, 255, 0.06), transparent 34%);
  filter: blur(84px) saturate(0.95);
  opacity: 0.46;
  animation: mesh-drift 18s ease-in-out infinite alternate;
}

body::after {
  background-image:
    linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
  background-size: 72px 72px;
  opacity: 0.18;
  mask-image: radial-gradient(circle at center, black, transparent 72%);
}

.page-noise {
  opacity: 0.13;
  mix-blend-mode: overlay;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.82' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='220' height='220' filter='url(%23n)' opacity='.45'/%3E%3C/svg%3E");
}

.hero {
  position: relative;
  isolation: isolate;
}

.hero::before,
.hero::after {
  position: absolute;
  z-index: -1;
  content: "";
  pointer-events: none;
}

.hero::before {
  top: 11%;
  left: 50%;
  width: 86vw;
  height: 18rem;
  min-width: 720px;
  border: 1px solid rgba(97, 244, 255, 0.05);
  background: linear-gradient(90deg, transparent, rgba(97, 244, 255, 0.08), rgba(155, 108, 255, 0.06), transparent);
  filter: blur(42px);
  opacity: 0.28;
  clip-path: polygon(0 45%, 18% 30%, 42% 52%, 68% 24%, 100% 42%, 100% 72%, 68% 54%, 40% 80%, 16% 58%, 0 76%);
  transform: translateX(-50%) rotate(-8deg);
  animation: aurora-sweep 16s ease-in-out infinite alternate;
}

.hero::after {
  inset: 10% -6% 4% -6%;
  border: 1px solid rgba(97, 244, 255, 0.13);
  border-radius: 38% 62% 55% 45%;
  background:
    linear-gradient(125deg, transparent 12%, rgba(97, 244, 255, 0.10) 36%, transparent 54%),
    linear-gradient(310deg, transparent 22%, rgba(155, 108, 255, 0.13), transparent 68%);
  opacity: 0.28;
  transform: rotate(-7deg);
}

.brand-mark {
  border-color: rgba(97, 244, 255, 0.42);
  color: var(--cyan);
  background: rgba(97, 244, 255, 0.09);
  box-shadow: 0 0 28px rgba(97, 244, 255, 0.14);
}

.nav-links,
.language-toggle {
  border-color: rgba(255, 255, 255, 0.08);
  background: rgba(5, 8, 15, 0.62);
  backdrop-filter: blur(22px);
}

.nav-links a:hover {
  background: rgba(97, 244, 255, 0.08);
}

.language-toggle button:hover,
.language-toggle button.active {
  color: #02060c;
  background: linear-gradient(135deg, rgba(97, 244, 255, 0.96), rgba(58, 167, 255, 0.88) 56%, rgba(155, 108, 255, 0.86));
}

.hero h1 {
  width: fit-content;
  max-width: 100%;
  background: linear-gradient(100deg, #ffffff 0%, #61f4ff 26%, #3aa7ff 48%, #9b6cff 72%, #44f0a9 100%);
  background-size: 170% 170%;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  animation: gradient-flow 9s ease-in-out infinite;
}

.hero-subtitle,
.section-heading p,
.contact-card p {
  color: rgba(255, 255, 255, 0.7);
}

.button {
  border-radius: 999px;
  min-height: 3.25rem;
  padding: 0.9rem 1.25rem;
  transition:
    transform 220ms ease,
    border-color 220ms ease,
    background 220ms ease,
    box-shadow 220ms ease;
}

.button.primary {
  border: 1px solid rgba(97, 244, 255, 0.4);
  color: #02060c;
  background: linear-gradient(135deg, rgba(97, 244, 255, 0.94), rgba(58, 167, 255, 0.86) 48%, rgba(155, 108, 255, 0.86));
  box-shadow: 0 18px 44px rgba(0, 0, 0, 0.34);
}

.button.primary:hover {
  box-shadow: 0 22px 56px rgba(0, 0, 0, 0.38), 0 0 34px rgba(97, 244, 255, 0.12);
}

.button.secondary {
  border-color: rgba(255, 255, 255, 0.1);
  background: rgba(255, 255, 255, 0.055);
  backdrop-filter: blur(18px);
}

.button.secondary:hover {
  border-color: rgba(97, 244, 255, 0.32);
  background: rgba(97, 244, 255, 0.09);
}

.proof-item,
.timeline-card,
.role-summary,
.bullet-row,
.case-band,
.skill-card,
.project-card,
.achievement,
.education-card,
.contact-card,
.hero-visual,
.system-column,
.system-core,
.module-tile,
.contact-link {
  position: relative;
  isolation: isolate;
  border-color: rgba(255, 255, 255, 0.09);
  background:
    linear-gradient(135deg, rgba(255, 255, 255, 0.065), rgba(255, 255, 255, 0.025)),
    rgba(255, 255, 255, 0.046);
  box-shadow: 0 28px 100px rgba(0, 0, 0, 0.26);
  backdrop-filter: blur(22px);
}

.proof-item::after,
.timeline-card::after,
.skill-card::after,
.project-card::after,
.education-card::after,
.achievement::after,
.contact-link::after {
  position: absolute;
  inset: -1px;
  z-index: -1;
  border-radius: inherit;
  content: "";
  background: linear-gradient(135deg, rgba(97, 244, 255, 0), rgba(97, 244, 255, 0.12), rgba(155, 108, 255, 0.1), rgba(68, 240, 169, 0));
  opacity: 0;
  transition: opacity 300ms ease;
}

.proof-item:hover::after,
.timeline-card:hover::after,
.skill-card:hover::after,
.project-card:hover::after,
.education-card:hover::after,
.achievement:hover::after,
.contact-link:hover::after {
  opacity: 1;
}

.proof-item {
  border-color: rgba(97, 244, 255, 0.14);
  background:
    radial-gradient(circle at 82% 12%, rgba(97, 244, 255, 0.10), transparent 34%),
    linear-gradient(135deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.025));
}

.proof-item::before {
  background:
    linear-gradient(90deg, transparent, rgba(97, 244, 255, 0.13), transparent),
    repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.04) 0, rgba(255, 255, 255, 0.04) 1px, transparent 1px, transparent 36px);
}

.proof-icon,
.case-icon,
.project-icon {
  border-color: rgba(97, 244, 255, 0.28);
  color: var(--cyan);
  background: rgba(97, 244, 255, 0.10);
}

.proof-item span,
.eyebrow,
